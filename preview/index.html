<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Inventory · Packaging Controls</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
              mono: ['JetBrains Mono', 'ui-monospace', 'monospace']
            }
          }
        }
      };
    </script>
    <style>
      :root {
        --bg: #ffffff;
        --panel: #f8faf6;
        --panel-elev: #ffffff;
        --border: #e3e8df;
        --border-strong: rgba(10, 12, 10, 0.18);
        --text: #0a0c0a;
        --text-muted: #5b6757;
        --text-subtle: #8a9583;
        --accent: #72BC44;
        --accent-bright: #8FD158;
        --accent-dark: #4a8f2c;
        --accent-soft: rgba(114, 188, 68, 0.12);
        --on-accent: #0a0c0a;
        --healthy: #10b981;
        --warning: #f59e0b;
        --critical: #ef4444;
      }
      html.dark {
        --bg: #0a0c0a;
        --panel: #14171a;
        --panel-elev: #14171a;
        --border: #1f2420;
        --border-strong: rgba(233, 239, 229, 0.16);
        --text: #e9efe5;
        --text-muted: #8a9583;
        --text-subtle: #5b6757;
        --on-accent: #0a0c0a;
      }
      html, body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
        font-feature-settings: 'cv11', 'ss01', 'ss03';
        -webkit-font-smoothing: antialiased;
      }
      .h-display {
        font-family: 'termina', 'Inter', ui-sans-serif, system-ui, sans-serif;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.045em;
      }
      .h-eyebrow {
        font-family: 'termina', 'Inter', ui-sans-serif, system-ui, sans-serif;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.18em;
        color: var(--accent);
      }
      .wordmark {
        font-family: 'termina', 'Inter', ui-sans-serif, system-ui, sans-serif;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.18em;
      }
      button:focus-visible, a:focus-visible, input:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }
      .tabular { font-variant-numeric: tabular-nums; }
      .font-mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }
      .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 14px; }
      .panel-elev { background: var(--panel-elev); border: 1px solid var(--border); border-radius: 14px; box-shadow: 0 1px 0 rgba(255,255,255,0.03) inset, 0 1px 2px rgba(0,0,0,0.2); }
      html.dark .panel-elev { box-shadow: 0 1px 0 rgba(255,255,255,0.03) inset, 0 8px 28px rgba(0,0,0,0.45); }
      .scrollbar-thin::-webkit-scrollbar { width: 8px; height: 8px; }
      .scrollbar-thin::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 999px; }
      .truncate { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Apply dark mode by default before paint
      var stored = localStorage.getItem('theme');
      var dark = stored ? stored === 'dark' : true;
      document.documentElement.classList.toggle('dark', dark);
    </script>
    <script src="seed.js"></script>
    <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/recharts@2.12.7/umd/Recharts.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
    <script type="text/babel" src="icons.jsx"></script>
    <script type="text/babel" src="components.jsx"></script>
    <script type="text/babel" src="dashboard.jsx"></script>
    <script type="text/babel" src="skus.jsx"></script>
    <script type="text/babel" src="alerts.jsx"></script>
    <script type="text/babel" src="app.jsx"></script>
  </body>
</html>
